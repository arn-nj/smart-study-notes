<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.6"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="860" height="460" fill="url(#grid)"/>
  <text x="430" y="32" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">URL Shortener</text>
  <rect x="35" y="95" width="125" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="97" y="122" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8">User</text>
  <text x="97" y="142" font-size="12" text-anchor="middle" fill="#1e40af">Long URL</text>
  <rect x="200" y="95" width="150" height="70" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="275" y="120" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">Short URL</text>
  <text x="275" y="140" font-size="12" text-anchor="middle" fill="#065f46">Service</text>
  <rect x="390" y="70" width="145" height="60" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="462" y="96" font-size="14" font-weight="bold" text-anchor="middle" fill="#9a3412">Token</text>
  <text x="462" y="114" font-size="12" text-anchor="middle" fill="#7c2d12">Service</text>
  <rect x="390" y="150" width="145" height="60" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="462" y="176" font-size="14" font-weight="bold" text-anchor="middle" fill="#6d28d9">Cassandra</text>
  <text x="462" y="194" font-size="12" text-anchor="middle" fill="#5b21b6">Short -&gt; Long</text>
  <rect x="585" y="95" width="125" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="647" y="121" font-size="14" font-weight="bold" text-anchor="middle" fill="#b91c1c">Short</text>
  <text x="647" y="141" font-size="12" text-anchor="middle" fill="#991b1b">URL Output</text>
  <rect x="585" y="250" width="220" height="120" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="695" y="278" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Analytics Sidecar</text>
  <text x="695" y="300" font-size="12" text-anchor="middle" fill="#475569">Click events</text>
  <text x="695" y="318" font-size="12" text-anchor="middle" fill="#475569">User agent</text>
  <text x="695" y="336" font-size="12" text-anchor="middle" fill="#475569">Geo source</text>
  <text x="695" y="354" font-size="12" text-anchor="middle" fill="#475569">Kafka -&gt; Spark/Hadoop</text>
  <text x="97" y="190" font-size="11" text-anchor="middle" fill="#475569">Submit</text>
  <text x="275" y="190" font-size="11" text-anchor="middle" fill="#475569">Generate</text>
  <text x="462" y="228" font-size="11" text-anchor="middle" fill="#475569">Persist mapping</text>
  <text x="647" y="190" font-size="11" text-anchor="middle" fill="#475569">Return</text>
  <path d="M 160 130 L 200 130" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 350 110 L 390 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 350 150 L 390 180" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 535 130 L 585 130" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 275 165 L 275 260 L 585 260" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="60" y="280" width="470" height="110" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="295" y="307" font-size="14" font-weight="bold" text-anchor="middle" fill="#854d0e">Redirect Flow</text>
  <text x="90" y="330" font-size="12" fill="#854d0e">1. User hits short URL.</text>
  <text x="90" y="350" font-size="12" fill="#854d0e">2. Service looks up short code in Cassandra.</text>
  <text x="90" y="370" font-size="12" fill="#854d0e">3. Service returns redirect to original long URL.</text>
</svg>