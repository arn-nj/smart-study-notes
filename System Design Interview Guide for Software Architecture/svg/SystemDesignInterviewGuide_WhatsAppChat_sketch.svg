<svg xmlns="http://www.w3.org/2000/svg" width="950" height="540" viewBox="0 0 950 540">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.6"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="950" height="540" fill="url(#grid)"/>
  <text x="475" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">WhatsApp-Style Messaging</text>
  <rect x="35" y="80" width="115" height="65" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="92" y="106" font-size="14" font-weight="bold" text-anchor="middle" fill="#9a3412">User U1</text>
  <text x="92" y="124" font-size="12" text-anchor="middle" fill="#7c2d12">Sender</text>
  <rect x="190" y="80" width="145" height="65" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="262" y="106" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">WebSocket</text>
  <text x="262" y="124" font-size="12" text-anchor="middle" fill="#065f46">Handler 1</text>
  <rect x="375" y="60" width="155" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="452" y="86" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8">WebSocket</text>
  <text x="452" y="104" font-size="12" text-anchor="middle" fill="#1e40af">Manager + Redis</text>
  <rect x="375" y="140" width="155" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="452" y="166" font-size="14" font-weight="bold" text-anchor="middle" fill="#6d28d9">Message</text>
  <text x="452" y="184" font-size="12" text-anchor="middle" fill="#5b21b6">Service + Cassandra</text>
  <rect x="570" y="80" width="145" height="65" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="642" y="106" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8">WebSocket</text>
  <text x="642" y="124" font-size="12" text-anchor="middle" fill="#1e3a8a">Handler 2</text>
  <rect x="760" y="80" width="115" height="65" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="817" y="106" font-size="14" font-weight="bold" text-anchor="middle" fill="#b91c1c">User U2</text>
  <text x="817" y="124" font-size="12" text-anchor="middle" fill="#991b1b">Receiver</text>
  <rect x="60" y="245" width="220" height="85" rx="12" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
  <text x="170" y="270" font-size="14" font-weight="bold" text-anchor="middle" fill="#854d0e">Offline Flow</text>
  <text x="170" y="292" font-size="12" text-anchor="middle" fill="#92400e">If receiver is offline, store message.</text>
  <text x="170" y="309" font-size="12" text-anchor="middle" fill="#92400e">Replay unread messages on reconnect.</text>
  <rect x="350" y="255" width="250" height="90" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="475" y="281" font-size="14" font-weight="bold" text-anchor="middle" fill="#166534">Group Messaging</text>
  <text x="475" y="302" font-size="12" text-anchor="middle" fill="#166534">Group message -&gt; Kafka -&gt; Group handler</text>
  <text x="475" y="320" font-size="12" text-anchor="middle" fill="#166534">Fan out to all members except sender</text>
  <rect x="650" y="245" width="235" height="90" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="767" y="271" font-size="14" font-weight="bold" text-anchor="middle" fill="#0369a1">Media Handling</text>
  <text x="767" y="292" font-size="12" text-anchor="middle" fill="#075985">Asset service uploads image or video</text>
  <text x="767" y="310" font-size="12" text-anchor="middle" fill="#075985">Message sends asset id, not binary data</text>
  <rect x="250" y="415" width="450" height="78" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="475" y="440" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Receipts</text>
  <text x="475" y="460" font-size="12" text-anchor="middle" fill="#475569">Sent -&gt; Delivered -&gt; Read</text>
  <text x="475" y="478" font-size="12" text-anchor="middle" fill="#475569">Receipts route back through manager to the sender handler</text>
  <path d="M 150 112 L 190 112" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 335 95 L 375 90" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 335 130 L 375 170" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 530 100 L 570 112" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 715 112 L 760 112" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 817 145 L 817 205 L 262 205 L 262 145" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="537" y="220" font-size="11" fill="#475569">delivery or read receipt returns to sender</text>
</svg>