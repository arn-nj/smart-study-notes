<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e4e4e4" stroke-width="0.6"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="url(#grid)"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#243b53">System Design Interview Roadmap</text>
  <rect x="35" y="90" width="120" height="70" rx="10" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="95" y="118" font-size="14" font-weight="bold" text-anchor="middle" fill="#9a3412">Question</text>
  <text x="95" y="138" font-size="12" text-anchor="middle" fill="#7c2d12">Prompt</text>
  <text x="95" y="154" font-size="12" text-anchor="middle" fill="#7c2d12">Scope</text>
  <rect x="185" y="90" width="120" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="245" y="118" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8">Clarify</text>
  <text x="245" y="138" font-size="12" text-anchor="middle" fill="#1e40af">FRs</text>
  <text x="245" y="154" font-size="12" text-anchor="middle" fill="#1e40af">NFRs</text>
  <rect x="335" y="90" width="120" height="70" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="395" y="118" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">Design</text>
  <text x="395" y="138" font-size="12" text-anchor="middle" fill="#065f46">Core</text>
  <text x="395" y="154" font-size="12" text-anchor="middle" fill="#065f46">Components</text>
  <rect x="485" y="90" width="120" height="70" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="545" y="118" font-size="14" font-weight="bold" text-anchor="middle" fill="#6d28d9">Scale</text>
  <text x="545" y="138" font-size="12" text-anchor="middle" fill="#5b21b6">Bottlenecks</text>
  <text x="545" y="154" font-size="12" text-anchor="middle" fill="#5b21b6">Failures</text>
  <rect x="635" y="90" width="120" height="70" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="695" y="118" font-size="14" font-weight="bold" text-anchor="middle" fill="#be123c">Trade-offs</text>
  <text x="695" y="138" font-size="12" text-anchor="middle" fill="#9f1239">Explain</text>
  <text x="695" y="154" font-size="12" text-anchor="middle" fill="#9f1239">Choices</text>
  <path d="M 155 125 L 185 125" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 305 125 L 335 125" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 455 125 L 485 125" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 605 125 L 635 125" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="60" y="235" width="680" height="130" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="400" y="262" font-size="15" font-weight="bold" text-anchor="middle" fill="#334155">What Good Candidates Do</text>
  <text x="88" y="290" font-size="12" fill="#334155">1. Ask scale questions before naming databases or queues.</text>
  <text x="88" y="312" font-size="12" fill="#334155">2. Separate user-facing behavior from internal quality goals.</text>
  <text x="88" y="334" font-size="12" fill="#334155">3. Pick defaults, then explain when they break.</text>
  <text x="88" y="356" font-size="12" fill="#334155">4. Call out latency, availability, consistency, and cost trade-offs.</text>
  <text x="95" y="186" font-size="11" text-anchor="middle" fill="#475569">Prompt</text>
  <text x="245" y="186" font-size="11" text-anchor="middle" fill="#475569">Requirements</text>
  <text x="395" y="186" font-size="11" text-anchor="middle" fill="#475569">Architecture</text>
  <text x="545" y="186" font-size="11" text-anchor="middle" fill="#475569">Scale path</text>
  <text x="695" y="186" font-size="11" text-anchor="middle" fill="#475569">Discussion</text>
</svg>