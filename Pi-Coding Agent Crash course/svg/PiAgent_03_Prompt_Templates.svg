<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d7dbe3" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#111827"/></marker></defs>
  <rect width="1200" height="800" fill="#fffbf7"/><rect width="1200" height="800" fill="url(#grid)"/>
  <text x="600" y="120" text-anchor="middle" font-size="34" font-family="Arial" fill="#111827">Prompt Templates</text>
  <rect x="100" y="240" width="280" height="140" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="240" y="292" text-anchor="middle" font-size="24" font-family="Arial">Short command</text><text x="240" y="325" text-anchor="middle" font-size="18" font-family="Arial">slash-style trigger</text>
  <rect x="460" y="240" width="280" height="140" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="600" y="292" text-anchor="middle" font-size="24" font-family="Arial">Expanded prompt</text><text x="600" y="325" text-anchor="middle" font-size="18" font-family="Arial">full workflow</text>
  <rect x="820" y="240" width="280" height="140" rx="18" fill="#fae8ff" stroke="#c026d3" stroke-width="3"/>
  <text x="960" y="292" text-anchor="middle" font-size="24" font-family="Arial">Reusable template</text><text x="960" y="325" text-anchor="middle" font-size="18" font-family="Arial">variables + reload</text>
  <line x1="380" y1="310" x2="460" y2="310" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="740" y1="310" x2="820" y2="310" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="600" y="530" text-anchor="middle" font-size="22" font-family="Arial" fill="#334155">Encode repeatable workflows once, reuse forever</text>
</svg>