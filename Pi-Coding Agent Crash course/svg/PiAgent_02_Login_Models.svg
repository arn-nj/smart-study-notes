  <rect x="860" y="230" width="250" height="140" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="985" y="285" text-anchor="middle" font-size="24" font-family="Arial">Scoped favorites</text><text x="985" y="318" text-anchor="middle" font-size="18" font-family="Arial">fast switching</text>
