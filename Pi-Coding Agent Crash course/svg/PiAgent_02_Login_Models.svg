<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d7dbe3" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#111827"/></marker></defs>
  <rect width="1200" height="800" fill="#fcfcff"/><rect width="1200" height="800" fill="url(#grid)"/>
  <text x="600" y="120" text-anchor="middle" font-size="34" font-family="Arial" fill="#111827">Login, Models, Scopes</text>
  <rect x="90" y="230" width="250" height="140" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="215" y="285" text-anchor="middle" font-size="24" font-family="Arial">Login</text><text x="215" y="318" text-anchor="middle" font-size="18" font-family="Arial">subscription or API key</text>
  <rect x="475" y="230" width="250" height="140" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
