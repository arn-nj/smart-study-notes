  <line x1="725" y1="300" x2="860" y2="300" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="600" y="530" text-anchor="middle" font-size="22" font-family="Arial" fill="#334155">Thinking level: minimal / low / medium / high</text>
