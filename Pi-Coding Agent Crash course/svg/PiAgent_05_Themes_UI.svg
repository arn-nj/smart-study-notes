<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d7dbe3" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#111827"/></marker></defs>
  <rect width="1200" height="800" fill="#fffdf7"/><rect width="1200" height="800" fill="url(#grid)"/>
  <text x="600" y="120" text-anchor="middle" font-size="34" font-family="Arial" fill="#111827">Themes and UI Customization</text>
  <rect x="120" y="250" width="260" height="130" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="250" y="302" text-anchor="middle" font-size="24" font-family="Arial">Built-in theme</text><text x="250" y="335" text-anchor="middle" font-size="18" font-family="Arial">dark / light</text>
  <rect x="470" y="250" width="260" height="130" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="600" y="302" text-anchor="middle" font-size="24" font-family="Arial">Workspace theme</text><text x="600" y="335" text-anchor="middle" font-size="18" font-family="Arial">custom colors</text>
  <rect x="820" y="250" width="260" height="130" rx="18" fill="#fae8ff" stroke="#c026d3" stroke-width="3"/>
  <text x="950" y="302" text-anchor="middle" font-size="24" font-family="Arial">Reload</text><text x="950" y="335" text-anchor="middle" font-size="18" font-family="Arial">theme appears</text>
  <line x1="380" y1="315" x2="470" y2="315" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="315" x2="820" y2="315" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="600" y="530" text-anchor="middle" font-size="22" font-family="Arial" fill="#334155">UI is part of the harness, not an afterthought</text>
</svg>