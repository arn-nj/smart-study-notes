<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid6" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="520" fill="url(#grid6)" stroke="none"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Tool Integration: Extending Agent Capabilities</text>
  <text x="400" y="58" font-size="12" text-anchor="middle" fill="#666">Agents execute actions by invoking external systems</text>
  
  <!-- Agent Box -->
  <rect x="150" y="80" width="500" height="60" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="400" y="107" font-size="14" font-weight="bold" text-anchor="middle" fill="#4f46e5">Intelligent Agent</text>
  <text x="400" y="128" font-size="10" text-anchor="middle" fill="#3730a3">Can understand intent, make decisions, execute actions</text>
  
  <!-- Arrow down -->
  <path d="M 400 140 L 400 170" stroke="#999" stroke-width="2.5" fill="none" marker-end="url(#arrow1)"/>
  
  <!-- Decision Point -->
  <text x="400" y="200" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Agent decides: "I need to fetch data"</text>
  
  <!-- Arrow down -->
  <path d="M 400 210 L 400 240" stroke="#999" stroke-width="2.5" fill="none" marker-end="url(#arrow1)"/>
  
  <!-- Tools Row -->
  <text x="400" y="270" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Available Tools &amp; Integrations</text>
  
  <!-- Tool 1: Database -->
  <g>
    <rect x="30" y="290" width="140" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="100" cy="320" r="25" fill="#fbbf24"/>
    <text x="100" y="328" font-size="20" text-anchor="middle">🗄️</text>
    <text x="100" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#b45309">Database</text>
    <text x="40" y="390" font-size="9" fill="#333">• Query data</text>
    <text x="40" y="406" font-size="9" fill="#333">• Update records</text>
    <text x="40" y="422" font-size="9" fill="#333">• Transactions</text>
    <text x="40" y="438" font-size="9" fill="#333">• Analytics</text>
    <text x="40" y="454" font-size="9" fill="#333">• Reports</text>
    <text x="40" y="470" font-size="9" fill="#333">• Backups</text>
  </g>
  
  <!-- Tool 2: REST API -->
  <g>
    <rect x="190" y="290" width="140" height="200" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="260" cy="320" r="25" fill="#60a5fa"/>
    <text x="260" y="328" font-size="20" text-anchor="middle">🔌</text>
    <text x="260" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">REST API</text>
    <text x="200" y="390" font-size="9" fill="#333">• Call external</text>
    <text x="200" y="406" font-size="9" fill="#333">• Send requests</text>
    <text x="200" y="422" font-size="9" fill="#333">• Webhooks</text>
    <text x="200" y="438" font-size="9" fill="#333">• Microservices</text>
    <text x="200" y="454" font-size="9" fill="#333">• 3rd party</text>
    <text x="200" y="470" font-size="9" fill="#333">  integrations</text>
  </g>
  
  <!-- Tool 3: Cloud Services -->
  <g>
    <rect x="350" y="290" width="140" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <circle cx="420" cy="320" r="25" fill="#86efac"/>
    <text x="420" y="328" font-size="20" text-anchor="middle">☁️</text>
    <text x="420" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#15803d">Cloud Svcs</text>
    <text x="360" y="390" font-size="9" fill="#333">• Storage</text>
    <text x="360" y="406" font-size="9" fill="#333">• Compute</text>
    <text x="360" y="422" font-size="9" fill="#333">• ML models</text>
    <text x="360" y="438" font-size="9" fill="#333">• Vision/NLP</text>
    <text x="360" y="454" font-size="9" fill="#333">• Translation</text>
    <text x="360" y="470" font-size="9" fill="#333">• Audio</text>
  </g>
  
  <!-- Tool 4: Files & Documents -->
  <g>
    <rect x="510" y="290" width="140" height="200" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <circle cx="580" cy="320" r="25" fill="#f87171"/>
    <text x="580" y="328" font-size="20" text-anchor="middle">📄</text>
    <text x="580" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">Files</text>
    <text x="520" y="390" font-size="9" fill="#333">• Read/Write</text>
    <text x="520" y="406" font-size="9" fill="#333">• Excel/PDF</text>
    <text x="520" y="422" font-size="9" fill="#333">• Parse data</text>
    <text x="520" y="438" font-size="9" fill="#333">• Generate</text>
    <text x="520" y="454" font-size="9" fill="#333">• Sharepoint</text>
    <text x="520" y="470" font-size="9" fill="#333">• Cloud storage</text>
  </g>
  
  <!-- Tool 5: Custom Actions -->
  <g>
    <rect x="670" y="290" width="100" height="200" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
    <circle cx="720" cy="320" r="25" fill="#d8b4fe"/>
    <text x="720" y="328" font-size="20" text-anchor="middle">⚙️</text>
    <text x="720" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#7e22ce">Custom</text>
    <text x="680" y="390" font-size="8" fill="#333">• Workflow</text>
    <text x="680" y="403" font-size="8" fill="#333">• Business</text>
    <text x="680" y="416" font-size="8" fill="#333">  logic</text>
    <text x="680" y="429" font-size="8" fill="#333">• Power</text>
    <text x="680" y="442" font-size="8" fill="#333">  Automate</text>
    <text x="680" y="455" font-size="8" fill="#333">• Events</text>
    <text x="680" y="468" font-size="8" fill="#333">• Callbacks</text>
  </g>
  
  <!-- Bottom: Key Point -->
  <rect x="30" y="510" width="740" height="0" rx="0" fill="none" stroke="none"/>
  <text x="400" y="505" font-size="11" text-anchor="middle" fill="#666" font-style="italic">✓ More tools = More capable agent | Every tool must be registered and tested before use</text>
  
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
  </defs>
</svg>