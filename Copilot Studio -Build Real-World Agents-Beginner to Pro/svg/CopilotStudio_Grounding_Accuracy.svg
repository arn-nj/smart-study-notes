<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="480" fill="url(#grid4)" stroke="none"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Grounding: The Foundation of Accuracy</text>
  <text x="400" y="58" font-size="12" text-anchor="middle" fill="#666">Providing context prevents hallucinations</text>
  
  <!-- Problem: Without Grounding -->
  <g>
    <rect x="30" y="80" width="330" height="180" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <text x="195" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">❌ Without Grounding</text>
    
    <!-- User Query -->
    <rect x="45" y="120" width="300" height="50" rx="5" fill="#fff5f5" stroke="#fca5a5" stroke-width="1"/>
    <text x="195" y="133" font-size="11" font-weight="bold" text-anchor="middle" fill="#7f1d1d">User Query</text>
    <text x="195" y="152" font-size="10" text-anchor="middle" fill="#991b1b">"What are our Q3 revenues?"</text>
    <text x="195" y="165" font-size="10" text-anchor="middle" fill="#991b1b">(No context provided)</text>
    
    <!-- Agent Hallucinates -->
    <path d="M 195 170 L 195 200" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    
    <!-- Made-up Answer -->
    <rect x="45" y="205" width="300" height="50" rx="5" fill="#ffcccb" stroke="#dc2626" stroke-width="1.5"/>
    <text x="195" y="218" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">❌ Made-up Answer</text>
    <text x="195" y="238" font-size="10" text-anchor="middle" fill="#7f1d1d">"$5M in Q3!" (incorrect)</text>
    <text x="195" y="251" font-size="10" text-anchor="middle" fill="#7f1d1d">Agent guessed, no source.</text>
  </g>
  
  <!-- Solution: With Grounding -->
  <g>
    <rect x="420" y="80" width="330" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
    <text x="585" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#15803d">✓ With Grounding</text>
    
    <!-- Knowledge Base Box -->
    <rect x="435" y="120" width="300" height="35" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="585" y="125" font-size="9" text-anchor="middle" fill="#166534">Knowledge Base: Financials DB</text>
    <text x="585" y="138" font-size="9" text-anchor="middle" fill="#15803d">Q3 Revenue = $12.5M (verified source)</text>
    
    <!-- User Query + Context -->
    <rect x="435" y="165" width="300" height="35" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="585" y="170" font-size="9" text-anchor="middle" fill="#166534">User Query + Context</text>
    <text x="585" y="183" font-size="9" text-anchor="middle" fill="#15803d">"What are our Q3 revenues?" (with DB access)</text>
    
    <!-- Agent Retrieves -->
    <path d="M 585 200 L 585 220" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    
    <!-- Accurate Answer -->
    <rect x="435" y="225" width="300" height="30" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="585" y="237" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">✓ Accurate Answer: $12.5M (sourced)</text>
  </g>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Bottom: Key Grounding Sources -->
  <rect x="30" y="300" width="720" height="160" rx="8" fill="#f3f0ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="328" font-size="13" font-weight="bold" text-anchor="middle" fill="#6b21a8">Common Grounding Sources</text>
  
  <!-- Databases -->
  <g>
    <circle cx="120" cy="380" r="30" fill="#e9d5ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="120" y="390" font-size="20" text-anchor="middle">🗄️</text>
    <text x="120" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Databases</text>
    <text x="120" y="433" font-size="9" text-anchor="middle" fill="#666">Live data, queries</text>
  </g>
  
  <!-- Documents -->
  <g>
    <circle cx="260" cy="380" r="30" fill="#e9d5ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="260" y="390" font-size="20" text-anchor="middle">📄</text>
    <text x="260" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Documents</text>
    <text x="260" y="433" font-size="9" text-anchor="middle" fill="#666">PDFs, wikis, KB</text>
  </g>
  
  <!-- APIs -->
  <g>
    <circle cx="400" cy="380" r="30" fill="#e9d5ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="400" y="390" font-size="20" text-anchor="middle">🔌</text>
    <text x="400" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">APIs</text>
    <text x="400" y="433" font-size="9" text-anchor="middle" fill="#666">Real-time services</text>
  </g>
  
  <!-- Web Search -->
  <g>
    <circle cx="540" cy="380" r="30" fill="#e9d5ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="540" y="390" font-size="20" text-anchor="middle">🌐</text>
    <text x="540" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Web</text>
    <text x="540" y="433" font-size="9" text-anchor="middle" fill="#666">Current info</text>
  </g>
  
  <!-- Custom Context -->
  <g>
    <circle cx="680" cy="380" r="30" fill="#e9d5ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="680" y="390" font-size="20" text-anchor="middle">🎯</text>
    <text x="680" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Custom</text>
    <text x="680" y="433" font-size="9" text-anchor="middle" fill="#666">Domain knowledge</text>
  </g>
</svg>