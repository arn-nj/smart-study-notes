<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" stroke="none"/>
  
  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Copilot Studio Process Flow</text>
  
  <!-- Step 1: Intent -->
  <circle cx="100" cy="150" r="35" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="155" font-size="14" font-weight="bold" text-anchor="middle" fill="#2563eb">Intent</text>
  
  <!-- Arrow 1 -->
  <path d="M 135 150 L 185 150" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Agent -->
  <rect x="190" y="115" width="80" height="70" rx="5" fill="none" stroke="#059669" stroke-width="2"/>
  <text x="230" y="155" font-size="14" font-weight="bold" text-anchor="middle" fill="#059669">Agent</text>
  
  <!-- Arrow 2 -->
  <path d="M 270 150 L 320 150" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Tool/Data -->
  <rect x="325" y="115" width="90" height="70" rx="5" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="370" y="145" font-size="13" font-weight="bold" text-anchor="middle" fill="#dc2626">Tool / Data</text>
  <text x="370" y="165" font-size="11" text-anchor="middle" fill="#dc2626">APIs, DBs</text>
  
  <!-- Arrow 3 -->
  <path d="M 415 150 L 465 150" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Answer -->
  <circle cx="530" cy="150" r="35" fill="none" stroke="#9333ea" stroke-width="2"/>
  <text x="530" y="155" font-size="14" font-weight="bold" text-anchor="middle" fill="#9333ea">Answer</text>
  
  <!-- Bottom annotations -->
  <text x="100" y="220" font-size="12" text-anchor="middle" fill="#555">User defines</text>
  <text x="100" y="235" font-size="12" text-anchor="middle" fill="#555">the goal</text>
  
  <text x="230" y="220" font-size="12" text-anchor="middle" fill="#555">Routes to</text>
  <text x="230" y="235" font-size="12" text-anchor="middle" fill="#555">right tool</text>
  
  <text x="370" y="220" font-size="12" text-anchor="middle" fill="#555">Retrieves</text>
  <text x="370" y="235" font-size="12" text-anchor="middle" fill="#555">information</text>
  
  <text x="530" y="220" font-size="12" text-anchor="middle" fill="#555">Returns</text>
  <text x="530" y="235" font-size="12" text-anchor="middle" fill="#555">result</text>
  
  <!-- Key point box -->
  <rect x="50" y="280" width="700" height="90" rx="5" fill="#f0f9ff" stroke="#2563eb" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="400" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="#2563eb">Key Steps in Every Agent Interaction</text>
  <text x="60" y="330" font-size="11" fill="#333">1. User provides intent (what they want)</text>
  <text x="60" y="350" font-size="11" fill="#333">2. Agent understands and routes based on intent</text>
  <text x="60" y="365" font-size="11" fill="#333">3. Tools/APIs execute and fetch data</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>