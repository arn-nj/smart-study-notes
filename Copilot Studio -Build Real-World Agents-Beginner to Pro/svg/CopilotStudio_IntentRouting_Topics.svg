<svg xmlns="http://www.w3.org/2000/svg" width="850" height="500" viewBox="0 0 850 500">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid5" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="850" height="500" fill="url(#grid5)" stroke="none"/>
  
  <!-- Title -->
  <text x="425" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Intent Routing: Smart Navigation</text>
  <text x="425" y="58" font-size="12" text-anchor="middle" fill="#666">Topics and Nodes guide conversations to the right paths</text>
  
  <!-- User Input -->
  <rect x="75" y="80" width="700" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="425" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="#b45309">User Input / Intent</text>
  <text x="425" y="125" font-size="11" text-anchor="middle" fill="#92400e">"I need help with billing issues" → Agent understands the intent</text>
  
  <!-- Arrow down -->
  <path d="M 425 130 L 425 160" stroke="#999" stroke-width="2.5" fill="none" marker-end="url(#arrowDark)"/>
  
  <!-- Agent Decision -->
  <circle cx="425" cy="185" r="35" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="425" y="190" font-size="12" font-weight="bold" text-anchor="middle" fill="#4f46e5">AGENT</text>
  <text x="425" y="204" font-size="10" text-anchor="middle" fill="#4f46e5">Intent classifier</text>
  
  <!-- Arrow to Topics -->
  <path d="M 425 220 L 425 250" stroke="#999" stroke-width="2.5" fill="none" marker-end="url(#arrowDark)"/>
  
  <!-- Topics & Nodes Row -->
  <text x="425" y="275" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Topics &amp; Nodes: Conversation Paths</text>
  
  <!-- Topic 1: Billing -->
  <g>
    <rect x="50" y="290" width="220" height="180" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">📋 Topic: Billing</text>
    
    <!-- Nodes -->
    <rect x="65" y="330" width="190" height="25" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="346" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e40af">Node: Invoice Lookup</text>
    
    <rect x="65" y="365" width="190" height="25" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="381" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e40af">Node: Payment Issues</text>
    
    <rect x="65" y="400" width="190" height="25" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="416" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e40af">Node: Refund Requests</text>
    
    <rect x="65" y="435" width="190" height="25" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="451" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e40af">Node: Escalation Path</text>
  </g>
  
  <!-- Topic 2: Technical Support -->
  <g>
    <rect x="315" y="290" width="220" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="425" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">⚙️ Topic: Technical</text>
    
    <!-- Nodes -->
    <rect x="330" y="330" width="190" height="25" rx="4" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
    <text x="425" y="346" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">Node: Connectivity</text>
    
    <rect x="330" y="365" width="190" height="25" rx="4" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
    <text x="425" y="381" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">Node: Diagnostics</text>
    
    <rect x="330" y="400" width="190" height="25" rx="4" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
    <text x="425" y="416" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">Node: Troubleshooting</text>
    
    <rect x="330" y="435" width="190" height="25" rx="4" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
    <text x="425" y="451" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">Node: Advanced Help</text>
  </g>
  
  <!-- Topic 3: Product Info -->
  <g>
    <rect x="580" y="290" width="220" height="180" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <text x="690" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b">📚 Topic: Product</text>
    
    <!-- Nodes -->
    <rect x="595" y="330" width="190" height="25" rx="4" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>
    <text x="690" y="346" font-size="10" font-weight="bold" text-anchor="middle" fill="#991b1b">Node: Features</text>
    
    <rect x="595" y="365" width="190" height="25" rx="4" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>
    <text x="690" y="381" font-size="10" font-weight="bold" text-anchor="middle" fill="#991b1b">Node: Pricing Tiers</text>
    
    <rect x="595" y="400" width="190" height="25" rx="4" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>
    <text x="690" y="416" font-size="10" font-weight="bold" text-anchor="middle" fill="#991b1b">Node: Updates</text>
    
    <rect x="595" y="435" width="190" height="25" rx="4" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>
    <text x="690" y="451" font-size="10" font-weight="bold" text-anchor="middle" fill="#991b1b">Node: Integration</text>
  </g>
  
  <defs>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
  </defs>
</svg>