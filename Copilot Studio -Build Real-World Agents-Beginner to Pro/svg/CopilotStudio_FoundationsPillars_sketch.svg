<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid3" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="550" fill="url(#grid3)" stroke="none"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Copilot Studio Foundations</text>
  <text x="400" y="58" font-size="13" text-anchor="middle" fill="#666">The building blocks of reliable agents</text>
  
  <!-- Foundation 1: Intent Clarity (Left) -->
  <g>
    <rect x="50" y="100" width="200" height="140" rx="8" fill="#f3f0ff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="150" cy="130" r="25" fill="#8b5cf6" stroke="none"/>
    <text x="150" y="140" font-size="16" font-weight="bold" text-anchor="middle" fill="white">🎯</text>
    <text x="150" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="#6b21a8">Intent Clarity</text>
    <text x="60" y="200" font-size="10" fill="#333">User clearly defines</text>
    <text x="60" y="215" font-size="10" fill="#333">what they want</text>
    <text x="60" y="230" font-size="10" fill="#333">Improves routing</text>
  </g>
  
  <!-- Foundation 2: Tool Integration (Center-Left) -->
  <g>
    <rect x="300" y="100" width="200" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <circle cx="400" cy="130" r="25" fill="#22c55e" stroke="none"/>
    <text x="400" y="140" font-size="16" font-weight="bold" text-anchor="middle" fill="white">⚙️</text>
    <text x="400" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="#15803d">Tool Integration</text>
    <text x="310" y="200" font-size="10" fill="#333">APIs, databases,</text>
    <text x="310" y="215" font-size="10" fill="#333">external services</text>
    <text x="310" y="230" font-size="10" fill="#333">Execute actions</text>
  </g>
  
  <!-- Foundation 3: Grounding (Center-Right) -->
  <g>
    <rect x="550" y="100" width="200" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <circle cx="650" cy="130" r="25" fill="#ef4444" stroke="none"/>
    <text x="650" y="140" font-size="16" font-weight="bold" text-anchor="middle" fill="white">📚</text>
    <text x="650" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="#991b1b">Grounding</text>
    <text x="560" y="200" font-size="10" fill="#333">Provide context,</text>
    <text x="560" y="215" font-size="10" fill="#333">knowledge base,</text>
    <text x="560" y="230" font-size="10" fill="#333">Improves accuracy</text>
  </g>
  
  <!-- Arrow pointing down -->
  <path d="M 400 250 L 400 300" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Core Agent System -->
  <rect x="150" y="310" width="500" height="100" rx="10" fill="#f0f4ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="400" y="335" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Intelligent Agent System</text>
  <text x="400" y="358" font-size="11" text-anchor="middle" fill="#333">Combines intent, tools, and grounding</text>
  <text x="400" y="378" font-size="11" text-anchor="middle" fill="#333">to understand requests and execute with reliability</text>
  
  <!-- Three pillars: Testing, Debugging, Permissions -->
  <g>
    <!-- Testing -->
    <rect x="50" y="440" width="210" height="85" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="155" y="462" font-size="12" font-weight="bold" text-anchor="middle" fill="#b45309">Testing</text>
    <text x="60" y="485" font-size="9" fill="#333">Validate output paths</text>
    <text x="60" y="498" font-size="9" fill="#333">Check edge cases</text>
    <text x="60" y="511" font-size="9" fill="#333">Verify reliability</text>
  </g>
  
  <g>
    <!-- Debugging -->
    <rect x="295" y="440" width="210" height="85" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="400" y="462" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">Debugging</text>
    <text x="305" y="485" font-size="9" fill="#333">Trace logs</text>
    <text x="305" y="498" font-size="9" fill="#333">Monitor behavior</text>
    <text x="305" y="511" font-size="9" fill="#333">Find issues</text>
  </g>
  
  <g>
    <!-- Permissions -->
    <rect x="540" y="440" width="210" height="85" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
    <text x="645" y="462" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b">Permissions</text>
    <text x="550" y="485" font-size="9" fill="#333">Control access</text>
    <text x="550" y="498" font-size="9" fill="#333">Scope operations</text>
    <text x="550" y="511" font-size="9" fill="#333">Design for safety</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
  </defs>
</svg>