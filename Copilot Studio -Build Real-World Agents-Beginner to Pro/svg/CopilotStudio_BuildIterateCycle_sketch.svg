<svg xmlns="http://www.w3.org/2000/svg" width="750" height="500" viewBox="0 0 750 500">
  <!-- Background Grid Pattern -->
  <defs>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="750" height="500" fill="url(#grid2)" stroke="none"/>
  
  <!-- Title -->
  <text x="375" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">Build &amp; Iterate Cycle</text>
  <text x="375" y="58" font-size="12" text-anchor="middle" fill="#666">Configure → Test → Refine</text>
  
  <!-- Central circle (cycle center) -->
  <circle cx="375" cy="280" r="160" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Step 1: Configure (Top) -->
  <g>
    <circle cx="375" cy="120" r="45" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="375" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#b45309">Configure</text>
    <text x="375" y="155" font-size="10" text-anchor="middle" fill="#92400e">Set up artifact</text>
  </g>
  
  <!-- Arrow 1: Configure → Test (curved) -->
  <path d="M 405 160 Q 500 200 500 300" stroke="#666" stroke-width="2.5" fill="none" marker-end="url(#arrow1)"/>
  
  <!-- Step 2: Test (Right) -->
  <g>
    <circle cx="575" cy="280" r="45" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="575" y="280" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Test</text>
    <text x="575" y="295" font-size="10" text-anchor="middle" fill="#1e3a8a">Run &amp; verify</text>
  </g>
  
  <!-- Arrow 2: Test → Refine (curved) -->
  <path d="M 535 310 Q 450 350 345 340" stroke="#666" stroke-width="2.5" fill="none" marker-end="url(#arrow2)"/>
  
  <!-- Step 3: Refine (Bottom) -->
  <g>
    <circle cx="235" cy="280" r="45" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <text x="235" y="285" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">Refine</text>
    <text x="235" y="300" font-size="10" text-anchor="middle" fill="#7f1d1d">Improve</text>
  </g>
  
  <!-- Arrow 3: Refine → Configure (curved back) -->
  <path d="M 265 250 Q 320 180 330 150" stroke="#666" stroke-width="2.5" fill="none" marker-end="url(#arrow3)"/>
  
  <!-- Center box: Goal -->
  <rect x="300" y="245" width="150" height="70" rx="5" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="375" y="265" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">Reliable Agent</text>
  <text x="375" y="283" font-size="10" text-anchor="middle" fill="#6b7280">with valid output</text>
  <text x="375" y="298" font-size="10" text-anchor="middle" fill="#6b7280">and proven paths</text>
  
  <!-- Key insights at bottom -->
  <rect x="20" y="400" width="710" height="80" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="423" font-size="12" font-weight="bold" text-anchor="middle" fill="#166534">Each cycle improves agent reliability</text>
  
  <text x="35" y="450" font-size="10" fill="#333">✓ Configure: Set expectations, scope, tools, permissions</text>
  <text x="35" y="468" font-size="10" fill="#333">✓ Test: Verify output paths, validate results, check logs</text>
  <text x="35" y="486" font-size="10" fill="#333">✓ Refine: Adjust settings, handle edge cases, improve reliability</text>
  
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>