<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid7" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#grid7)" stroke="none"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Multi-Agent Orchestration</text>
  <text x="400" y="58" font-size="12" text-anchor="middle" fill="#666">Specialized agents collaborate on complex problems</text>
  
  <!-- User Request -->
  <rect x="200" y="80" width="400" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="400" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#b45309">User Request</text>
  <text x="400" y="125" font-size="10" text-anchor="middle" fill="#92400e">"Process order #12345 and send confirmation email"</text>
  
  <!-- Arrow down -->
  <path d="M 400 130 L 400 160" stroke="#999" stroke-width="2.5" fill="none" marker-end="url(#arrowMain)"/>
  
  <!-- Orchestrator/Router -->
  <circle cx="400" cy="200" r="40" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="400" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#4f46e5">ROUTER</text>
  <text x="400" y="218" font-size="9" text-anchor="middle" fill="#4f46e5">Orchestrator</text>
  
  <!-- Three specialist agents -->
  
  <!-- Agent 1: Order Processing -->
  <g>
    <rect x="30" y="270" width="220" height="200" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="140" cy="300" r="25" fill="#60a5fa" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="305" font-size="18" text-anchor="middle">📦</text>
    
    <text x="140" y="345" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">Order Agent</text>
    <text x="140" y="363" font-size="9" text-anchor="middle" fill="#1e40af">Specialist</text>
    
    <!-- Tasks -->
    <text x="45" y="385" font-size="9" fill="#333" font-weight="bold">Tasks:</text>
    <text x="45" y="401" font-size="9" fill="#333">✓ Validate order</text>
    <text x="45" y="417" font-size="9" fill="#333">✓ Check inventory</text>
    <text x="45" y="433" font-size="9" fill="#333">✓ Reserve items</text>
    <text x="45" y="449" font-size="9" fill="#333">✓ Calculate total</text>
  </g>
  
  <!-- Agent 2: Payment Processing -->
  <g>
    <rect x="290" y="270" width="220" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
    <circle cx="400" cy="300" r="25" fill="#86efac" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="305" font-size="18" text-anchor="middle">💳</text>
    
    <text x="400" y="345" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">Payment Agent</text>
    <text x="400" y="363" font-size="9" text-anchor="middle" fill="#15803d">Specialist</text>
    
    <!-- Tasks -->
    <text x="305" y="385" font-size="9" fill="#333" font-weight="bold">Tasks:</text>
    <text x="305" y="401" font-size="9" fill="#333">✓ Verify payment</text>
    <text x="305" y="417" font-size="9" fill="#333">✓ Process charge</text>
    <text x="305" y="433" font-size="9" fill="#333">✓ Handle failures</text>
    <text x="305" y="449" font-size="9" fill="#333">✓ Receipt gen</text>
  </g>
  
  <!-- Agent 3: Communication -->
  <g>
    <rect x="550" y="270" width="220" height="200" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="660" cy="300" r="25" fill="#f87171" stroke="#ef4444" stroke-width="2"/>
    <text x="660" y="305" font-size="18" text-anchor="middle">📧</text>
    
    <text x="660" y="345" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b">Email Agent</text>
    <text x="660" y="363" font-size="9" text-anchor="middle" fill="#991b1b">Specialist</text>
    
    <!-- Tasks -->
    <text x="565" y="385" font-size="9" fill="#333" font-weight="bold">Tasks:</text>
    <text x="565" y="401" font-size="9" fill="#333">✓ Format message</text>
    <text x="565" y="417" font-size="9" fill="#333">✓ Send email</text>
    <text x="565" y="433" font-size="9" fill="#333">✓ Track delivery</text>
    <text x="565" y="449" font-size="9" fill="#333">✓ Log action</text>
  </g>
  
  <!-- Arrows from Router to Agents -->
  <path d="M 360 240 L 150 270" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowSmall)"/>
  <path d="M 400 240 L 400 270" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowSmall)"/>
  <path d="M 440 240 L 660 270" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowSmall)"/>
  
  <!-- Key benefit box -->
  <rect x="30" y="485" width="740" height="0" rx="0" fill="none" stroke="none"/>
  <text x="400" y="480" font-size="11" text-anchor="middle" fill="#666" font-style="italic">✓ Complex workflows = Multiple agents working in parallel | Orchestrator coordinates handoffs</text>
  
  <defs>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
    <marker id="arrowSmall" markerWidth="8" markerHeight="8" refX="8" refY="2" orient="auto">
      <polygon points="0 0, 8 2, 0 4" fill="#999"/>
    </marker>
  </defs>
</svg>