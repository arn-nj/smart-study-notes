<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#c8d8e8" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="#f7f9fc"/>
  <rect width="800" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1a252f">Session Tree Structure — JSONL + parentId</text>
  <line x1="60" y1="44" x2="740" y2="44" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- File on disk label -->
  <rect x="60" y="56" width="200" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="160" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">~/.pi/agent/sessions/project/</text>
  <rect x="60" y="92" width="200" height="24" rx="4" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1"/>
  <text x="160" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">session_abc123.jsonl</text>

  <!-- Arrow from file to tree -->
  <line x1="260" y1="104" x2="320" y2="104" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="283" y="98" font-family="Georgia, serif" font-size="9" fill="#7f8c8d">read by</text>
  <text x="283" y="112" font-family="Georgia, serif" font-size="9" fill="#7f8c8d">/tree</text>

  <!-- ROOT node -->
  <rect x="330" y="80" width="160" height="44" rx="20" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="410" y="99" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="white">msg_001</text>
  <text x="410" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#bdc3c7">user: &quot;build dashboard&quot;</text>
  <text x="410" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7f8c8d">parentId: null</text>

  <!-- Arrow down to msg_002 -->
  <line x1="410" y1="124" x2="410" y2="170" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- msg_002 -->
  <rect x="330" y="174" width="160" height="44" rx="8" fill="#2980b9" stroke="#2471a3" stroke-width="2"/>
  <text x="410" y="193" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="white">msg_002</text>
  <text x="410" y="209" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d6eaf8">assistant: &quot;I&apos;ll create...&quot;</text>
  <text x="410" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7f8c8d">parentId: msg_001</text>

  <!-- Arrow down to msg_003 -->
  <line x1="410" y1="218" x2="410" y2="258" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- msg_003 tool call -->
  <rect x="330" y="262" width="160" height="44" rx="8" fill="#8e44ad" stroke="#7d3c98" stroke-width="2"/>
  <text x="410" y="281" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="white">msg_003</text>
  <text x="410" y="297" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#e8daef">tool: read layout.ts</text>
  <text x="410" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#bdc3c7">parentId: msg_002</text>

  <!-- FORK arrow left to msg_004a -->
  <line x1="330" y1="284" x2="240" y2="370" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="330" font-family="Georgia, serif" font-size="10" fill="#e74c3c">Branch A</text>

  <!-- FORK arrow right to msg_004b -->
  <line x1="490" y1="284" x2="580" y2="370" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="330" font-family="Georgia, serif" font-size="10" fill="#27ae60">Branch B</text>

  <!-- msg_004a (left branch) -->
  <rect x="140" y="374" width="160" height="50" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="220" y="393" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="white">msg_004a</text>
  <text x="220" y="409" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#fadbd8">assistant: v1 plan</text>
  <text x="220" y="422" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#f9b5b5">parentId: msg_003</text>

  <!-- msg_004b (right branch) -->
  <rect x="520" y="374" width="160" height="50" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="600" y="393" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="white">msg_004b</text>
  <text x="600" y="409" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d5f5e3">assistant: v2 plan</text>
  <text x="600" y="422" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#a9dfbf">parentId: msg_003</text>

  <!-- Continuation of branches -->
  <line x1="220" y1="424" x2="220" y2="460" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="600" y1="424" x2="600" y2="460" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="220" y="476" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7f8c8d">continues...</text>
  <text x="600" y="476" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7f8c8d">continues...</text>

  <!-- JSONL explanation box -->
  <rect x="60" y="370" width="65" height="80" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="92" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a5b00">All msgs</text>
  <text x="92" y="404" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a5b00">in ONE</text>
  <text x="92" y="418" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a5b00">.jsonl file</text>
  <text x="92" y="434" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#e74c3c">nothing</text>
  <text x="92" y="448" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#e74c3c">deleted!</text>

  <!-- Footer annotation -->
  <text x="400" y="505" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2c3e50">Key insight: same parentId on two messages = instant fork. No special DB needed.</text>
  <text x="400" y="518" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7f8c8d">Navigate with /tree | fork from any past message | all branches coexist</text>
</svg>
